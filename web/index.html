<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prescript Pager</title>
  <style>
    :root {
      --bg: #07131b;
      --panel: #0b1f2b;
      --panel-2: #112b39;
      --line: rgba(150, 225, 255, 0.25);
      --glow: #8fe7ff;
      --glow-soft: rgba(143, 231, 255, 0.25);
      --text: #baf2ff;
      --text-dim: #7bb9c7;
      --danger: #ffd2d2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(120, 220, 255, 0.08), transparent 35%),
        linear-gradient(180deg, #040a0e 0%, #07131b 45%, #03080c 100%);
      color: var(--text);
      font-family: "Consolas", "Courier New", monospace;
      overflow: hidden;
    }

    .shell {
      position: relative;
      width: min(92vw, 860px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(9, 26, 36, 0.96), rgba(5, 16, 22, 0.96));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 0 30px rgba(100, 220, 255, 0.08),
        0 0 90px rgba(70, 160, 255, 0.08);
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.06) 0px,
          rgba(255,255,255,0.06) 1px,
          rgba(0, 0, 0, 0.03) 2px,
          transparent 4px,
          transparent 6px
        );
      mix-blend-mode: screen;
      opacity: 0.48;
    }

    .shell::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 52%, rgba(0,0,0,0.42) 100%),
        linear-gradient(180deg, rgba(120, 170, 255, 0.03), rgba(255,255,255,0.02), rgba(120, 170, 255, 0.03));
      filter: blur(0.4px);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      padding-top: 6px;
      padding-bottom: 4px;
    }

    .logo {
  width: min(42vw, 190px);
  max-width: 190px;
}
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      letter-spacing: 0.14em;
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--glow);
      box-shadow: 0 0 12px var(--glow);
      animation: pulse 1.6s infinite ease-in-out;
    }

    .body {
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .screen {
      position: relative;
      min-height: 330px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 18px 22px;
      background:
        linear-gradient(180deg, rgba(150, 235, 255, 0.10), rgba(150, 235, 255, 0.03)),
        linear-gradient(180deg, rgba(6, 18, 25, 0.98), rgba(8, 28, 38, 0.98));
      box-shadow:
        inset 0 0 20px rgba(143, 231, 255, 0.08),
        inset 0 -16px 30px rgba(0,0,0,0.40),
        0 0 20px rgba(143, 231, 255, 0.06);
    }

    .screen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .prescript-id {
      color: var(--text);
      text-shadow: 0 0 8px var(--glow-soft);
    }

    .output {
      white-space: pre-wrap;
      line-height: 1.85;
      font-size: clamp(18px, 2.1vw, 25px);
      min-height: 210px;
      color: var(--text);
      text-shadow: 0 0 10px rgba(143, 231, 255, 0.18);
      word-break: break-word;
      position: relative;
      letter-spacing: 0.04em;
    }

    .output.scrambling {
      filter: blur(0.15px);
      text-shadow:
        0 0 8px rgba(143, 231, 255, 0.28),
        0 0 18px rgba(143, 231, 255, 0.12);
    }

    .glyph {
      opacity: 0.84;
    }

    .glyph.locked {
      opacity: 1;
    }

    .cursor {
      display: inline-block;
      width: 0.68em;
      animation: blink 0.9s step-end infinite;
    }

    .meta {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(143, 231, 255, 0.4);
      background: linear-gradient(180deg, rgba(30, 80, 100, 0.65), rgba(9, 28, 36, 0.85));
      color: var(--text);
      padding: 14px 18px;
      min-width: 260px;
      border-radius: 12px;
      font: inherit;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 18px rgba(143, 231, 255, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.05),
        0 0 24px rgba(143, 231, 255, 0.2);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: wait;
      transform: none;
    }

    .subline {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .error {
      color: var(--danger);
      text-shadow: none;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes pulse {
      50% { opacity: 0.35; }
    }

    @keyframes jitter {
      0% { transform: translateX(0); }
      25% { transform: translateX(0.2px); }
      50% { transform: translateX(-0.2px); }
      75% { transform: translateX(0.15px); }
      100% { transform: translateX(0); }
    }

    .screen.is-receiving .output {
      animation: jitter 0.06s linear infinite;
    }

    @media (max-width: 680px) {
      .meta {
        grid-template-columns: 1fr;
      }
      .button {
        width: 100%;
        min-width: 0;
      }
      .controls {
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>PRESCRIPT PAGER TERMINAL</div>
      <div class="status"><span class="dot"></span><span id="statusText">LINK STABLE</span></div>
    </div>

    <div class="body">
      <div class="logo-wrap">
        <img src="Index_Logo.png" alt="Index Logo" class="logo" />
      </div>
      <div class="screen">
        <div class="screen-header">
          <span>ACTIVE CHANNEL</span>
          <span class="prescript-id" id="prescriptId">PS-000</span>
        </div>

        <div class="output" id="output">等待接收指令<span class="cursor">█</span></div>

        <div class="meta">
          <div class="meta-box">MODE: <span id="modeValue">RITUAL</span></div>
          <div class="meta-box">STATE: <span id="stateValue">IDLE</span></div>
          <div class="meta-box">LAST SYNC: <span id="timeValue">--:--:--</span></div>
        </div>
      </div>

      <div class="controls">
        <button class="button" id="receiveBtn">RECEIVE PRESCRIPT</button>
        <div class="subline">PRESS TO REQUEST A NEW DIRECTIVE</div>
      </div>
    </div>
  </div>

  <script>
  const receiveBtn = document.getElementById('receiveBtn');
  const terminalText = document.getElementById('terminalText');
  const noiseOverlay = document.getElementById('noiseOverlay');
  const bgm = document.getElementById('bgm');
  const sfx = document.getElementById('sfx');

  // --- 拼贴辅助函数（原作者洗白算法） ---
  function normalizePunctuation(text) {
    if (!text) return text;
    return text
      .replace(/\s*,\s*\./g, ".")
      .replace(/\s*\.\s*,/g, ".")
      .replace(/([.,!?])\1+/g, "$1")
      .replace(/\s+([.,!?])/g, "$1")
      .replace(/([.,!?])([A-Za-z])/g, "$1 $2")
      .replace(/([.!?]\s+)([a-z])/g, (_, p1, p2) => p1 + p2.toUpperCase())
      .replace(/^\s*([a-z])/g, m => m.toUpperCase())
      .trim();
  }

  const randInt = (max) => Math.floor(Math.random() * max);
  const pick = (arr) => (arr && arr.length > 0) ? arr[randInt(arr.length)] : "";

  function ordinalSuffix(n) {
    const mod100 = n % 100;
    if (mod100 >= 11 && mod100 <= 13) return "th";
    switch (n % 10) {
      case 1: return "st";
      case 2: return "nd";
      case 3: return "rd";
      default: return "th";
    }
  }

  function capFirst(s) {
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
  }

  // --- 核心拼贴引擎 ---
  async function generatePrescript() {
    // 异步拉取分离出去的纯文本库文件
    const res = await fetch('word_banks.json');
    if (!res.ok) throw new Error("无法读取 word_banks.json 文本库文件");
    const db = await res.json();

    // 150分之1的概率直接掉落大段预设指令
    if (randInt(150) === 4) {
      return pick(db.preprescript);
    }

    // 摇出一轮全局基础随机种子（这一步和原作者逻辑完全对齐）
    const state = {
      number1: randInt(150) + 1,
      number7: randInt(100) + 1,
      number2: randInt(400) + 1,
      number4: randInt(1300) + 1,
      number5: randInt(6) + 1,
      number9: randInt(8) + 1,
      number8: randInt(7) + 1,
      number11: randInt(12) + 1,
      
      finalllocation: pick(db.locationA),
      finalpersonidentifyer: pick(db.personidentifyer),
      finalpersonidentifyer2: pick(db.personidentifyer2),
      finalcolor1: pick(db.color1),
      finalcolorrequire: pick(db.color1),
      finalptype: pick(db.persontype),
      finalptype1: pick(db.persontype),
      finalptype2: pick(db.persontype2),
      finalptype3: pick(db.persontype2),
      
      finalclothing: (pick(db.material_condition) + pick(db.clothing)).trim(),
      finalclothing2: (pick(db.material_condition) + pick(db.clothing)).trim(),
      finalgames: pick(db.games)
    };

    state.end1 = ordinalSuffix(state.number1);
    state.end7 = ordinalSuffix(state.number7);
    state.end8 = ordinalSuffix(state.number8);

    // 递归解析占位符 Token 引擎，允许词条内部无限套娃
    function resolveTokens(str) {
      if (!str) return "";
      let lastStr = "";
      let currentStr = str;

      while (currentStr !== lastStr) {
        lastStr = currentStr;
        currentStr = currentStr.replace(/{([\w_]+)}/g, (match, token) => {
          // 匹配到了预设的变量
          if (state[token] !== undefined) return state[token];
          
          // 匹配到了实时抽取的 {pick_xxx}
          if (token.startsWith('pick_')) {
            const bankName = token.replace('pick_', '');
            if (db[bankName]) return pick(db[bankName]);
          }
          return match;
        });
      }
      return currentStr;
    }

    // 生成复合嵌套词条
    state.finalobjcs = resolveTokens(pick(db.objcs));
    state.finaltopic = resolveTokens(pick(db.topic));
    state.finalactivities = resolveTokens(pick(db.activities));

    // 根据分支几率决定去哪个寻找目标的池子里抽
    let howtofindPool;
    if (state.number5 > 5) {
      howtofindPool = state.finalpersonidentifyer !== "" ? db.howtofind_case1 : db.howtofind_case2;
    } else {
      howtofindPool = state.finalpersonidentifyer !== "" ? db.howtofind_case3 : db.howtofind_case4;
    }
    state.finalhowtofind = resolveTokens(pick(howtofindPool));
    state.finaladditionalrandom = resolveTokens(pick(db.additionalrandom));

    // 拼装宏观大句子
    const finaltask0 = resolveTokens(pick(db.task0));
    let finalstarter = resolveTokens(pick(db.starter));
    let finaltask1 = resolveTokens(pick(db.task1));

    // 首字母大写修正补丁
    if (finaltask0 === "") {
      if (finalstarter) finalstarter = capFirst(finalstarter);
      else if (finaltask1) finaltask1 = capFirst(finaltask1);
    }

    let finalscript = finaltask0 + finalstarter + finaltask1;

    // 是否拼贴追击第二阶段后续指令
    if (randInt(2) === 1) {
      const finaltransition = resolveTokens(pick(db.transition));
      const finalfollowup = resolveTokens(pick(db.followup));
      const finalfollowup2 = (randInt(4) === 2) ? resolveTokens(pick(db.follow2up)) : "";

      finalscript += finaltransition + finalfollowup + finalfollowup2;
    }

    // 洗白字符并返回
    return normalizePunctuation(finalscript);
  }

  // --- 原汁原味的随机符号解码动画算法 ---
  function scrambleReveal(text, element, duration = 3000, callback) {
    const chars = "112233";
    const length = text.length;
    let progress = 0;
    const intervalTime = 30;
    const totalSteps = duration / intervalTime;
    const stepIncrement = 1 / totalSteps;

    const timer = setInterval(() => {
      progress += stepIncrement;
      if (progress >= 1) {
        progress = 1;
        clearInterval(timer);
      }

      let currentDisplay = "";
      for (let i = 0; i < length; i++) {
        if (text[i] === " " || text[i] === "\n") {
          currentDisplay += text[i];
          continue;
        }
        const revealThreshold = (i / length) * 0.4 + 0.6 * progress;
        if (progress >= revealThreshold) {
          currentDisplay += text[i];
        } else {
          currentDisplay += chars[Math.floor(Math.random() * chars.length)];
        }
      }

      element.textContent = currentDisplay;

      if (progress === 1 && callback) {
        callback();
      }
    }, intervalTime);
  }

  // --- 交互控制与动效触发 ---
  receiveBtn.addEventListener('click', async () => {
    receiveBtn.disabled = true;
    receiveBtn.style.opacity = '0.5';

    // 播放背景乐与打字音效
    if (bgm.paused) {
      bgm.volume = 0.4;
      bgm.play().catch(e => console.log("BGM 自动播放受限:", e));
    }
    sfx.currentTime = 0;
    sfx.play().catch(e => console.log("SFX 播放错误:", e));

    // 第一阶段：杂音突变提示
    terminalText.style.color = '#ff3b30';
    terminalText.textContent = "RECEIVING PRESCRIPT FROM THE INDEX...";
    noiseOverlay.style.animation = 'noise-sharp 0.2s infinite, glitch-anim 0.5s infinite';

    setTimeout(async () => {
      // 恢复平稳电台微弱杂音
      noiseOverlay.style.animation = 'noise-subtle 1s infinite';
      terminalText.style.color = '#00ff66';

      try {
        // 【核心平替部分】：不再从外部 txt 读整行，而是调用实时拼贴引擎拼出一句成品
        const selectedPrescript = await generatePrescript();

        // 喂给原有的特殊符号解码打字机动画
        scrambleReveal(selectedPrescript, terminalText, 4000, () => {
          receiveBtn.disabled = false;
          receiveBtn.style.opacity = '1';
        });
      } catch (error) {
        console.error(error);
        terminalText.style.color = '#ff3b30';
        terminalText.textContent = "ERROR: INTERNET CORS BLOCKED OR CORES COLLAPSED.";
        receiveBtn.disabled = false;
        receiveBtn.style.opacity = '1';
      }
    }, 1500); 
  });
</script>
</body>
</html>
