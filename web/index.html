<!DOCTYPE html>
<script src="prescript.js"></script>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prescript Pager</title>
  <style>
    :root {
      --bg: #07131b;
      --panel: #0b1f2b;
      --panel-2: #112b39;
      --line: rgba(150, 225, 255, 0.25);
      --glow: #8fe7ff;
      --glow-soft: rgba(143, 231, 255, 0.25);
      --text: #baf2ff;
      --text-dim: #7bb9c7;
      --danger: #ffd2d2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(120, 220, 255, 0.08), transparent 35%),
        linear-gradient(180deg, #040a0e 0%, #07131b 45%, #03080c 100%);
      color: var(--text);
      font-family: "Consolas", "Courier New", monospace;
      overflow: hidden;
    }

    .shell {
      position: relative;
      width: min(92vw, 860px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(9, 26, 36, 0.96), rgba(5, 16, 22, 0.96));
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 0 30px rgba(100, 220, 255, 0.08),
        0 0 90px rgba(70, 160, 255, 0.08);
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(255,255,255,0.06) 0px,
          rgba(255,255,255,0.06) 1px,
          rgba(0, 0, 0, 0.03) 2px,
          transparent 4px,
          transparent 6px
        );
      mix-blend-mode: screen;
      opacity: 0.48;
    }

    .shell::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 52%, rgba(0,0,0,0.42) 100%),
        linear-gradient(180deg, rgba(120, 170, 255, 0.03), rgba(255,255,255,0.02), rgba(120, 170, 255, 0.03));
      filter: blur(0.4px);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      padding-top: 6px;
      padding-bottom: 4px;
    }

    .logo {
  width: min(42vw, 190px);
  max-width: 190px;
}
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      letter-spacing: 0.14em;
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--glow);
      box-shadow: 0 0 12px var(--glow);
      animation: pulse 1.6s infinite ease-in-out;
    }

    .body {
      padding: 22px;
      display: grid;
      gap: 16px;
    }

    .screen {
      position: relative;
      min-height: 330px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 18px 22px;
      background:
        linear-gradient(180deg, rgba(150, 235, 255, 0.10), rgba(150, 235, 255, 0.03)),
        linear-gradient(180deg, rgba(6, 18, 25, 0.98), rgba(8, 28, 38, 0.98));
      box-shadow:
        inset 0 0 20px rgba(143, 231, 255, 0.08),
        inset 0 -16px 30px rgba(0,0,0,0.40),
        0 0 20px rgba(143, 231, 255, 0.06);
    }

    .screen-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .prescript-id {
      color: var(--text);
      text-shadow: 0 0 8px var(--glow-soft);
    }

    .output {
      white-space: pre-wrap;
      line-height: 1.85;
      font-size: clamp(18px, 2.1vw, 25px);
      min-height: 210px;
      color: var(--text);
      text-shadow: 0 0 10px rgba(143, 231, 255, 0.18);
      word-break: break-word;
      position: relative;
      letter-spacing: 0.04em;
    }

    .output.scrambling {
      filter: blur(0.15px);
      text-shadow:
        0 0 8px rgba(143, 231, 255, 0.28),
        0 0 18px rgba(143, 231, 255, 0.12);
    }

    .glyph {
      opacity: 0.84;
    }

    .glyph.locked {
      opacity: 1;
    }

    .cursor {
      display: inline-block;
      width: 0.68em;
      animation: blink 0.9s step-end infinite;
    }

    .meta {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .meta-box {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(143, 231, 255, 0.4);
      background: linear-gradient(180deg, rgba(30, 80, 100, 0.65), rgba(9, 28, 36, 0.85));
      color: var(--text);
      padding: 14px 18px;
      min-width: 260px;
      border-radius: 12px;
      font: inherit;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 18px rgba(143, 231, 255, 0.12);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.05),
        0 0 24px rgba(143, 231, 255, 0.2);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: wait;
      transform: none;
    }

    .subline {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .error {
      color: var(--danger);
      text-shadow: none;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes pulse {
      50% { opacity: 0.35; }
    }

    @keyframes jitter {
      0% { transform: translateX(0); }
      25% { transform: translateX(0.2px); }
      50% { transform: translateX(-0.2px); }
      75% { transform: translateX(0.15px); }
      100% { transform: translateX(0); }
    }

    .screen.is-receiving .output {
      animation: jitter 0.06s linear infinite;
    }

    @media (max-width: 680px) {
      .meta {
        grid-template-columns: 1fr;
      }
      .button {
        width: 100%;
        min-width: 0;
      }
      .controls {
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div>PRESCRIPT PAGER TERMINAL</div>
      <div class="status"><span class="dot"></span><span id="statusText">LINK STABLE</span></div>
    </div>

    <div class="body">
      <div class="logo-wrap">
        <img src="Index_Logo.png" alt="Index Logo" class="logo" />
      </div>
      <div class="screen">
        <div class="screen-header">
          <span>ACTIVE CHANNEL</span>
          <span class="prescript-id" id="prescriptId">PS-000</span>
        </div>

        <div class="output" id="output">等待接收指令中<span class="cursor">█</span></div>

        <div class="meta">
          <div class="meta-box">MODE: <span id="modeValue">RITUAL</span></div>
          <div class="meta-box">STATE: <span id="stateValue">IDLE</span></div>
          <div class="meta-box">LAST SYNC: <span id="timeValue">--:--:--</span></div>
        </div>
      </div>

      <div class="controls">
        <button class="button" id="receiveBtn">RECEIVE PRESCRIPT</button>
        <div class="subline">PRESS TO REQUEST A NEW DIRECTIVE</div>
      </div>
    </div>
  </div>

  <script>
    const output = document.getElementById('output');
    const receiveBtn = document.getElementById('receiveBtn');
    const prescriptId = document.getElementById('prescriptId');
    const modeValue = document.getElementById('modeValue');
    const stateValue = document.getElementById('stateValue');
    const timeValue = document.getElementById('timeValue');
    const statusText = document.getElementById('statusText');
    const screen = document.querySelector('.screen');

    let counter = 0;
    let audioCtx = null;
    const SCRAMBLE_SET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*+-/=<>?▓▒░';

    function nowTime() {
      return new Date().toLocaleTimeString('zh-CN', { hour12: false });
    }

    function nextId() {
      counter += 1;
      return `PS-${String(counter).padStart(3, '0')}`;
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep(freq = 980, duration = 0.06, delay = 0, volume = 0.03) {
      const ctx = ensureAudio();
      const start = ctx.currentTime + delay;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(start);
      osc.stop(start + duration + 0.01);
    }

    function tripleBeep() {
      beep(920, 0.05, 0.00);
      beep(1100, 0.05, 0.09);
      beep(980, 0.07, 0.18);
    }

    function randomGlyph() {
      return SCRAMBLE_SET[Math.floor(Math.random() * SCRAMBLE_SET.length)];
    }

    function renderGlyphs(chars, lockedCount = 0) {
      output.innerHTML = chars.map((ch, idx) => {
        const cls = idx < lockedCount ? 'glyph locked' : 'glyph';
        return `<span class="${cls}">${ch}</span>`;
      }).join('') + '<span class="cursor">█</span>';
    }

    async function typeText(text, speed = 28) {
      output.textContent = '';
      for (let i = 0; i < text.length; i++) {
        output.textContent += text[i];
        if (text[i].trim()) {
          beep(820 + (i % 5) * 50, 0.018, 0, 0.014);
        }
        await new Promise(resolve => setTimeout(resolve, speed));
      }
      output.innerHTML = `${output.textContent}<span class="cursor">█</span>`;
    }

    async function scrambleReveal(finalText, rounds = 9, frameDelay = 42) {
      const chars = Array.from(finalText);
      const working = chars.map(ch => (ch.trim() ? randomGlyph() : ch));

      output.classList.add('scrambling');
      screen.classList.add('is-receiving');

      for (let locked = 0; locked <= chars.length; locked++) {
        for (let round = 0; round < rounds; round++) {
          for (let i = locked; i < chars.length; i++) {
            if (!chars[i].trim()) {
              working[i] = chars[i];
            } else if (Math.random() < 0.7) {
              working[i] = randomGlyph();
            }
          }

          for (let i = 0; i < locked; i++) {
            working[i] = chars[i];
          }

          renderGlyphs(working, locked);
          beep(700 + (locked % 6) * 45, 0.014, 0, 0.008);
          await new Promise(resolve => setTimeout(resolve, frameDelay));
        }
      }

      output.classList.remove('scrambling');
      screen.classList.remove('is-receiving');
      output.innerHTML = `${finalText}<span class="cursor">█</span>`;
    }

    async function fetchPrescript() {
      receiveBtn.disabled = true;
      stateValue.textContent = 'RECEIVING';
      statusText.textContent = 'REQUESTING';
      prescriptId.textContent = nextId();
      tripleBeep();
  
  // 1. 模拟网络延迟（保持交互感）
      await typeText('正在接收指令...', 18);
      try {
        const userId = getOrCreateUserId(); 
        const rng = makeDailyRng(userId);
        const text = generatePrescript(rng); // 这里直接获取生成的句子

    // 3. 更新界面状态
        modeValue.textContent = 'RITUAL'; 
        stateValue.textContent = 'DECODING';
        timeValue.textContent = nowTime();
        statusText.textContent = 'LINK STABLE';
    
        tripleBeep();
    
    // 4. 执行揭示动画
        await scrambleReveal(text, 7, 36); 
        stateValue.textContent = 'IDLE';
    
      } catch (err) {
        output.innerHTML = `<span class="error">系统错误：${String(err.message || err)}</span><span class="cursor">█</span>`;
        screen.classList.remove('is-receiving');
        output.classList.remove('scrambling');
        stateValue.textContent = 'ERROR';
        timeValue.textContent = nowTime();
        statusText.textContent = 'LINK DEGRADED';
        beep(260, 0.15, 0);
      } finally {
        receiveBtn.disabled = false;
      }
    }

    receiveBtn.addEventListener('click', async () => {
      try {
        ensureAudio();
        if (audioCtx.state === 'suspended') {
          await audioCtx.resume();
        }
      } catch (e) {}
      fetchPrescript();
    });

    timeValue.textContent = nowTime();
  </script>
</body>
</html>
